<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geocities Builder</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
        color: #111;
        background:
          radial-gradient(circle at 20px 20px, rgba(255, 255, 255, 0.24) 1px, transparent 1px) 0 0 / 120px 120px,
          radial-gradient(circle at 80px 60px, rgba(255, 215, 0, 0.18) 1px, transparent 1px) 0 0 / 160px 160px,
          linear-gradient(180deg, #123d79 0%, #1f2c61 100%);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 20px 20px, rgba(255, 255, 255, 0.24) 1px, transparent 1px) 0 0 / 120px 120px,
          radial-gradient(circle at 80px 60px, rgba(255, 215, 0, 0.18) 1px, transparent 1px) 0 0 / 160px 160px,
          linear-gradient(180deg, #123d79 0%, #1f2c61 100%);
        color: #111;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 3px ridge #d7d7d7;
        background: linear-gradient(180deg, #fff 0%, #d9d9d9 100%);
        color: #111;
        padding: 0.75rem 1rem;
        cursor: pointer;
        border-radius: 6px;
        box-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
      }

      button:hover {
        transform: translateY(-1px);
      }

      .shell {
        width: min(1280px, calc(100vw - 1rem));
        margin: 0 auto;
        padding: 0.5rem 0 1rem;
        display: grid;
        gap: 0.75rem;
      }

      .banner {
        border: 6px double #ffef67;
        background: linear-gradient(180deg, #ff5a7a 0%, #ffcc33 100%);
        color: #111;
        text-align: center;
        padding: 0.5rem;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      }

      .banner marquee {
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(300px, 0.9fr) minmax(360px, 1.1fr);
        gap: 0.75rem;
        align-items: start;
      }

      .panel {
        border: 6px ridge #efefef;
        background: rgba(255, 255, 255, 0.94);
        padding: 0.9rem;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3.8rem);
        line-height: 1;
        text-align: center;
        margin-bottom: 0.4rem;
      }

      .lede {
        text-align: center;
        margin-bottom: 0.9rem;
      }

      .field-grid {
        display: grid;
        gap: 0.7rem;
      }

      .field {
        display: grid;
        gap: 0.35rem;
      }

      .field span {
        font-size: 0.9rem;
        font-weight: 700;
      }

      input,
      textarea,
      select {
        border: 3px inset #bbb;
        background: #fffff8;
        color: #111;
        border-radius: 4px;
        padding: 0.7rem;
      }

      textarea {
        min-height: 180px;
        resize: vertical;
        line-height: 1.5;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        align-items: center;
      }

      .mini-note {
        font-size: 0.82rem;
        color: #333;
      }

      .preview-frame {
        width: 100%;
        min-height: 760px;
        border: 6px ridge #efefef;
        background: #fff;
      }

      .footer-row {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .footer-row a {
        color: #fff;
      }

      .status-badge {
        border: 3px groove #fff;
        background: #fff4a8;
        padding: 0.35rem 0.6rem;
        font-size: 0.8rem;
      }

      @media (max-width: 980px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .preview-frame {
          min-height: 680px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      const state = {
        title: 'My Awesome Zone',
        marquee: 'Welcome to my corner of the web',
        accent: '#ff66cc',
        bg: '#123d79',
        text: 'Type your site copy here. Use short lines, loud claims, and a little chaos. Blank lines make new sections appear in the preview.',
        template: 'retro',
      };

      const constructionIcons = [
        svgData('#ffcc00', '#1e1e1e', 'UNDER CONSTRUCTION'),
        svgData('#ff6666', '#ffffff', 'NEW HOT SPOT'),
        svgData('#66ddff', '#000000', 'CLICK HERE'),
      ];

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function svgData(bg, fg, label) {
        const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="180" height="120" viewBox="0 0 180 120">
            <rect width="180" height="120" rx="14" fill="${bg}"/>
            <rect x="10" y="10" width="160" height="100" rx="12" fill="#fff8dc" stroke="#111" stroke-width="4" stroke-dasharray="10 6"/>
            <g fill="${fg}" font-family="Comic Sans MS, Comic Sans, cursive, sans-serif" text-anchor="middle">
              <text x="90" y="38" font-size="18" font-weight="700">UNDER</text>
              <text x="90" y="62" font-size="18" font-weight="700">CONSTRUCTION</text>
              <text x="90" y="90" font-size="16">${label}</text>
            </g>
            <path d="M22 96H158" stroke="#111" stroke-width="4" stroke-linecap="round"/>
            <path d="M28 104l18-30 18 30" fill="none" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
            <path d="M116 104l18-30 18 30" fill="none" stroke="#111" stroke-width="4" stroke-linejoin="round"/>
          </svg>`;
        return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
      }

      function paragraphsFromText(text) {
        return text
          .split(/\n\s*\n/g)
          .map((chunk) => chunk.trim())
          .filter(Boolean)
          .map((chunk) => chunk.replace(/\n/g, ' '));
      }

      function buildPreviewHtml() {
        const paragraphs = paragraphsFromText(state.text);
        const sectionHtml = paragraphs.length
          ? paragraphs.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join('')
          : '<p>Start typing to fill this page with glitter, links, and loud design choices.</p>';

        return `<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${escapeHtml(state.title)}</title>
    <style>
      :root {
        font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
        color: #111;
        background:
          radial-gradient(circle at 12px 12px, rgba(255,255,255,0.26) 1px, transparent 1px) 0 0 / 84px 84px,
          radial-gradient(circle at 56px 44px, rgba(255,215,0,0.24) 1px, transparent 1px) 0 0 / 120px 120px,
          linear-gradient(180deg, ${state.bg} 0%, #111a45 100%);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 12px 12px, rgba(255,255,255,0.26) 1px, transparent 1px) 0 0 / 84px 84px,
          radial-gradient(circle at 56px 44px, rgba(255,215,0,0.24) 1px, transparent 1px) 0 0 / 120px 120px,
          linear-gradient(180deg, ${state.bg} 0%, #111a45 100%);
        padding: 16px;
      }
      marquee {
        color: #fff;
        background: linear-gradient(90deg, ${state.accent}, #ffe86b, ${state.accent});
        border: 4px ridge #fff;
        padding: 0.25rem 0;
        font-weight: 700;
      }
      .page {
        max-width: 980px;
        margin: 0 auto;
        background: rgba(255,255,255,0.95);
        border: 6px ridge #fff;
        box-shadow: 0 16px 35px rgba(0,0,0,0.25);
        overflow: hidden;
      }
      .hero {
        padding: 18px;
        text-align: center;
        border-bottom: 6px double ${state.accent};
        background: linear-gradient(180deg, #fff8f3, #fff);
      }
      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.3rem);
        text-shadow: 2px 2px 0 ${state.accent};
      }
      .flex {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
        padding: 18px;
      }
      .box {
        border: 4px ridge #d6d6d6;
        background: #fffff8;
        padding: 14px;
      }
      .box h2 {
        margin: 0 0 10px;
        text-align: center;
        background: ${state.accent};
        color: #fff;
        padding: 6px;
      }
      p {
        margin: 0 0 0.9rem;
        line-height: 1.55;
      }
      .icons {
        display: grid;
        gap: 12px;
        justify-items: center;
      }
      .icons img {
        width: 180px;
        height: 120px;
        border: 3px groove #444;
        transform-origin: center;
        animation: wobble 4s linear infinite;
        background: #fff;
      }
      .icons img:nth-child(2) { animation-duration: 5s; }
      .icons img:nth-child(3) { animation-duration: 6s; }
      .button-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 12px;
      }
      .button-row a {
        display: inline-block;
        padding: 10px 14px;
        background: #ffe86b;
        border: 3px outset #fff;
        color: #111;
        text-decoration: none;
        font-weight: 700;
      }
      .guestbook {
        border-top: 4px double ${state.accent};
        padding: 18px;
        background: linear-gradient(180deg, #fff, #fff8dc);
      }
      .guestbook form {
        display: grid;
        gap: 10px;
      }
      .guestbook textarea,
      .guestbook input {
        width: 100%;
        border: 3px inset #b9b9b9;
        padding: 10px;
        background: #fffef7;
      }
      .guestbook button {
        justify-self: start;
        border: 3px ridge #ccc;
        background: linear-gradient(180deg, #fff 0%, #ddd 100%);
        padding: 10px 14px;
      }
      .footer {
        padding: 14px;
        border-top: 4px ridge #ccc;
        text-align: center;
        background: #f5f5f5;
      }
      .footer a { color: #0b52ff; }
      .cursor {
        animation: blink 1s steps(2, end) infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes wobble {
        0% { transform: rotate(-2deg) scale(1); }
        25% { transform: rotate(2deg) scale(1.03); }
        50% { transform: rotate(-1deg) scale(1); }
        75% { transform: rotate(1deg) scale(1.03); }
        100% { transform: rotate(-2deg) scale(1); }
      }
      @media (max-width: 760px) {
        .flex { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <marquee behavior="alternate" scrollamount="8">${escapeHtml(state.marquee)} :: ${escapeHtml(state.title)}</marquee>
      <section class="hero">
        <h1>${escapeHtml(state.title)}</h1>
        <div class="cursor">&lt;3</div>
      </section>
      <section class="flex">
        <article class="box">
          <h2>Welcome</h2>
          ${sectionHtml}
          <div class="button-row">
            <a href="#">home</a>
            <a href="#">guestbook</a>
            <a href="#">links</a>
          </div>
        </article>
        <aside class="box">
          <h2>Under Construction</h2>
          <div class="icons">
            <img src="${constructionIcons[0]}" alt="Under construction sign 1" />
            <img src="${constructionIcons[1]}" alt="Under construction sign 2" />
            <img src="${constructionIcons[2]}" alt="Under construction sign 3" />
          </div>
        </aside>
      </section>
      <section class="guestbook">
        <h2>Guestbook</h2>
        <form>
          <input type="text" value="Name your visitor" />
          <textarea rows="4">${escapeHtml(state.text.split('\n\n')[0] || state.text)}</textarea>
          <button type="button">Sign guestbook</button>
        </form>
      </section>
      <div class="footer">
        <marquee scrollamount="5">Thanks for stopping by. Come back soon.</marquee>
        <p><a href="https://alvinhua.ng" target="_blank" rel="noreferrer">alvinhua.ng</a></p>
      </div>
    </div>
  </body>
</html>`;
      }

      function syncPreview() {
        const iframe = document.getElementById('preview');
        iframe.srcdoc = buildPreviewHtml();
      }

      function renderApp() {
        const root = document.getElementById('root');
        root.innerHTML = `
          <div class="shell">
            <div class="banner"><marquee behavior="alternate" scrollamount="7">Geocities Builder :: make your page loud, shiny, and a little too proud</marquee></div>
            <main class="workspace">
              <section class="panel">
                <h1>Geocities Builder</h1>
                <p class="lede">Paste your text, pick a mood, and preview a glorious retro web page.</p>
                <div class="field-grid">
                  <label class="field">
                    <span>Page title</span>
                    <input id="title" type="text" value="${escapeHtml(state.title)}" />
                  </label>
                  <label class="field">
                    <span>Marquee text</span>
                    <input id="marquee" type="text" value="${escapeHtml(state.marquee)}" />
                  </label>
                  <label class="field">
                    <span>Body text</span>
                    <textarea id="body">${escapeHtml(state.text)}</textarea>
                  </label>
                  <div class="control-row">
                    <label class="field" style="flex:1; min-width: 180px;">
                      <span>Background</span>
                      <select id="theme">
                        <option value="#123d79">Night sky</option>
                        <option value="#5c1a47">Bubblegum</option>
                        <option value="#1f5e3b">Forest neon</option>
                        <option value="#5b3a17">Retro sunset</option>
                      </select>
                    </label>
                    <label class="field" style="flex:1; min-width: 180px;">
                      <span>Accent</span>
                      <input id="accent" type="color" value="${state.accent}" />
                    </label>
                  </div>
                  <div class="control-row">
                    <button id="randomize" type="button">Randomize page</button>
                    <button id="refresh" type="button">Refresh preview</button>
                    <span class="status-badge">Marquee tags on</span>
                  </div>
                  <p class="mini-note">The preview updates live and the guestbook keeps the old-school feel.</p>
                </div>
              </section>
              <section class="panel">
                <div class="footer-row">
                  <h2>Preview</h2>
                  <span class="mini-note">Rendered in an iframe</span>
                </div>
                <iframe id="preview" class="preview-frame" title="Geocities preview"></iframe>
              </section>
            </main>
            <div class="banner"><marquee behavior="alternate" scrollamount="6">keep it loud, keep it weird, keep it local</marquee></div>
            <div class="footer-row">
              <span class="mini-note">Built for chaos and nostalgia.</span>
              <a href="https://alvinhua.ng" target="_blank" rel="noreferrer">alvinhua.ng</a>
            </div>
          </div>
        `;

        const title = document.getElementById('title');
        const marquee = document.getElementById('marquee');
        const body = document.getElementById('body');
        const accent = document.getElementById('accent');
        const theme = document.getElementById('theme');
        const randomize = document.getElementById('randomize');
        const refresh = document.getElementById('refresh');

        const syncState = () => {
          state.title = title.value.trim() || 'My Awesome Zone';
          state.marquee = marquee.value.trim() || 'Welcome to my corner of the web';
          state.text = body.value;
          state.accent = accent.value;
          state.bg = theme.value;
          syncPreview();
        };

        [title, marquee, body, accent, theme].forEach((element) => element.addEventListener('input', syncState));
        refresh.addEventListener('click', syncState);
        randomize.addEventListener('click', () => {
          const picks = [
            {
              title: 'My Sparkly Web Den',
              marquee: 'You have entered a neon miracle',
              bg: '#5c1a47',
              accent: '#63ffdf',
              text: 'This page loves sparkles, blinking text, and dramatic opinions.\n\nDrop your own copy here and make the internet feel personal again.',
            },
            {
              title: 'Retro Startup Shrine',
              marquee: 'Investors, lurkers, and curious friends all welcome',
              bg: '#1f5e3b',
              accent: '#ffe86b',
              text: 'Tell the story. Make it loud. Use a few paragraphs and a little too much confidence.\n\nA guestbook always makes it better.',
            },
            {
              title: 'Chaos Garden',
              marquee: 'Everything is under construction forever',
              bg: '#5b3a17',
              accent: '#ff77aa',
              text: 'The tiled stars are non negotiable. The marquee is mandatory.\n\nIf the page feels a little over the top, you are doing it right.',
            },
          ];
          const pick = picks[Math.floor(Math.random() * picks.length)];
          title.value = pick.title;
          marquee.value = pick.marquee;
          body.value = pick.text;
          theme.value = pick.bg;
          accent.value = pick.accent;
          syncState();
        });

        syncPreview();
      }

      renderApp();
    </script>
  </body>
</html>
